<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 450" style="width: 100%; height: auto; display: block;">
  <!-- BACKGROUND BANDS -->
  <rect x="0" y="0" width="100%" height="55" fill="#f4fff6" />
  <rect x="0" y="110" width="100%" height="55" fill="#f4fff6" />
  <rect x="0" y="230" width="100%" height="70" fill="#f5f5f5" />

  <style>
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #000; }
    .label-italic { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-style: italic; fill: #000; }

    .exon-green { fill: #1aa64b; }
    .intron-green { stroke: #1aa64b; stroke-width: 1.5px; fill: none; }

    .exon-grey { fill: #3d3d3d; }
    .intron-grey { stroke: #3d3d3d; stroke-width: 1.5px; fill: none; }

    .exon-blue { fill: #0d71ba; }
    .intron-blue { stroke: #0d71ba; stroke-width: 1.5px; fill: none; }
  </style>

  <!-- SAMPLE 1 -->
  <g transform="translate(0, 10)">
    <text x="30" y="32" class="label">Sample 1</text>
    <line x1="150" y1="26" x2="880" y2="26" class="intron-green" />
    <rect x="150" y="20" width="120" height="12" class="exon-green" />
    <rect x="450" y="20" width="90" height="12" class="exon-green" />
    <rect x="620" y="20" width="25" height="12" class="exon-green" />
    <rect x="730" y="20" width="150" height="12" class="exon-green" />
  </g>

  <!-- SAMPLE 2 -->
  <g transform="translate(0, 65)">
    <text x="30" y="32" class="label">Sample 2</text>
    <line x1="210" y1="26" x2="635" y2="26" class="intron-green" />
    <rect x="210" y="20" width="60" height="12" class="exon-green" />
    <rect x="450" y="20" width="60" height="12" class="exon-green" />
    <rect x="620" y="20" width="15" height="12" class="exon-green" />
  </g>

  <!-- SAMPLE 3 -->
  <g transform="translate(0, 120)">
    <text x="30" y="32" class="label">Sample 3</text>
    <line x1="480" y1="26" x2="1050" y2="26" class="intron-green" />
    <rect x="480" y="20" width="60" height="12" class="exon-green" />
    <rect x="730" y="20" width="150" height="12" class="exon-green" />
    <rect x="980" y="20" width="70" height="12" class="exon-green" />
  </g>

  <!-- SAMPLE 4 -->
  <g transform="translate(0, 175)">
    <text x="30" y="32" class="label">Sample 4</text>
    <line x1="150" y1="26" x2="1010" y2="26" class="intron-green" />
    <rect x="150" y="20" width="120" height="12" class="exon-green" />
    <rect x="450" y="20" width="90" height="12" class="exon-green" />
    <rect x="730" y="20" width="150" height="12" class="exon-green" />
    <rect x="980" y="20" width="30" height="12" class="exon-green" />
  </g>

  <!-- REFERENCE ANNOTATION -->
  <g transform="translate(0, 245)">
    <text x="30" y="24" class="label">Reference</text>
    <text x="30" y="48" class="label">annotation</text>
    <line x1="150" y1="26" x2="1050" y2="26" class="intron-grey" />
    <rect x="150" y="20" width="120" height="12" class="exon-grey" />
    <rect x="450" y="20" width="90" height="12" class="exon-grey" />
    <rect x="620" y="20" width="25" height="12" class="exon-grey" />
    <rect x="730" y="20" width="150" height="12" class="exon-grey" />
    <rect x="980" y="20" width="70" height="12" class="exon-grey" />
  </g>

  <!-- MERGED ASSEMBLIES (A) -->
  <g transform="translate(0, 325)">
    <text x="30" y="24" class="label">Merged</text>
    <text x="30" y="48" class="label">assemblies</text>
    <text x="1070" y="32" class="label-italic">(A)</text>
    <line x1="150" y1="26" x2="1050" y2="26" class="intron-blue" />
    <rect x="150" y="20" width="120" height="12" class="exon-blue" />
    <rect x="450" y="20" width="90" height="12" class="exon-blue" />
    <rect x="620" y="20" width="25" height="12" class="exon-blue" />
    <rect x="730" y="20" width="150" height="12" class="exon-blue" />
    <rect x="980" y="20" width="70" height="12" class="exon-blue" />
  </g>

  <!-- MERGED ASSEMBLIES (B) -->
  <g transform="translate(0, 375)">
    <text x="1070" y="32" class="label-italic">(B)</text>
    <line x1="150" y1="26" x2="1050" y2="26" class="intron-blue" />
    <rect x="150" y="20" width="120" height="12" class="exon-blue" />
    <rect x="450" y="20" width="90" height="12" class="exon-blue" />
    <rect x="730" y="20" width="150" height="12" class="exon-blue" />
    <rect x="980" y="20" width="70" height="12" class="exon-blue" />
  </g>
</svg>
